<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SigVerify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    #particles-bg { position:fixed; inset:0; width:100%; height:100%; z-index:0;
      background:radial-gradient(ellipse at 80% 20%,#1a0533 0%,#0a0a0f 55%,#001a2e 100%); }
    .flash { padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:13px; font-weight:500; }
    .flash.success { background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.3); color:#4ade80; }
    .flash.error   { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.3); color:#f87171; }
  </style>
</head>
<body>
  <div id="particles-bg"></div>
  <div class="card-wrapper">
    <div class="card">
      <h2>Welcome Back</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form action="/login" method="post">
        <input type="email"    name="email"    class="form-control" placeholder="Email"    required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <div class="divider">no account?</div>
      <a href="/signup" class="btn btn-outline-light">Create Account</a>
      <a href="/"       class="btn btn-outline-light" style="margin-top:8px;">Back to Home</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
  <script>
    tsParticles.load("particles-bg",{fullScreen:{enable:false},background:{color:{value:"transparent"}},fpsLimit:60,
      particles:{number:{value:120,density:{enable:true,area:800}},color:{value:["#ffffff","#c96287","#a78bfa"]},
        shape:{type:"circle"},opacity:{value:{min:.1,max:.7},animation:{enable:true,speed:1,sync:false}},
        size:{value:{min:.5,max:2}},move:{enable:true,speed:{min:.1,max:.6},random:true,outModes:{default:"out"}},
        twinkle:{particles:{enable:true,frequency:.05,opacity:1}}},detectRetina:true});
  </script>
</body>
</html>
